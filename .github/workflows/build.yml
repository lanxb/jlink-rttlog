name: Build & Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_jlink_rttlog.py -v

      - name: Build EXE
        run: python -m PyInstaller --onefile --name jlink-rttlog --distpath . jlink-rttlog.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlink-rttlog
          path: jlink-rttlog.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jlink-rttlog

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: jlink-rttlog.exe
          generate_release_notes: true
